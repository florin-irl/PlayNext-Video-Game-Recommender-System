<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Library - PlayNext</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <nav class="main-nav">
        <a href="home.html" class="logo"
          >Play<span class="accent">Next</span></a
        >
        <ul>
          <li><a href="my-games.html" class="active">My Games</a></li>
          <li><a href="recommendations.html">Recommendations</a></li>
          <li><a href="popular-now.html">Popular Now</a></li>
          <li><a href="#">About</a></li>
        </ul>
      </nav>
    </header>

    <main class="page-content">
      <h1 class="page-title">Your Library</h1>
      <div class="games-grid" id="library-grid">
        <!-- Game covers will be dynamically inserted here -->
      </div>
    </main>

    <div class="modal-overlay" id="add-game-modal">
      <div class="modal-content">
        <span class="modal-close" id="modal-close-btn">&times;</span>
        <h2>Add a Game to Your Library</h2>
        <input
          type="search"
          id="game-search-input"
          placeholder="Search for a game (e.g., The Witcher 3)..."
        />
        <div class="search-results-list" id="search-results">
          <!-- Search results will appear here -->
        </div>
      </div>
    </div>

    <script src="my-games.js"></script>
  </body>
</html>
